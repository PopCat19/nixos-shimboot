# shimboot-unified.yml
#
# Purpose: Multi-board image construction and GitHub release orchestration
#
# This module:
# - Orchestrate parallel builds for multiple ChromeOS boards via matrix
# - Leverage Nix for reproducible component building and RootFS generation
# - Assemble final bootable images using custom shell tooling
# - Automate GitHub Releases with platform-specific flashing instructions

name: shimboot-unified

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Target Board'
        required: true
        default: 'dedede'
        type: choice
        options: [all, dedede, octopus, zork, nissa, hatch, grunt, snappy]
      create_release:
        description: 'Publish as GitHub Release (requires board=all usually)'
        required: false
        default: false
        type: boolean

      rootfs:
        description: 'Rootfs Variant'
        required: true
        default: 'minimal'
        type: choice
        options: [minimal, full]
      drivers_mode:
        description: 'Driver Mode'
        required: true
        default: 'vendor'
        type: choice
        options: [vendor, inject, both, none]
      firmware_upstream:
        description: 'Include upstream firmware'
        required: false
        default: true
        type: boolean

      build_mode:
        description: 'Build Mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - cachix-only
          - systemd-only
      build_patched_systemd:
        description: 'Build and push patched systemd to Cachix'
        required: false
        default: true
        type: boolean
      runner_type:
        description: 'Runner'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options: [ubuntu-latest, popcat19-nixos0]
      include_checksum:
        description: 'Generate SHA256 checksum'
        required: false
        default: true
        type: boolean
      inspect_after:
        description: 'Debug: Inspect image partition table'
        required: false
        default: false
        type: boolean

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        # Handle 'all' vs single board selection
        board: >-
          ${{
            github.event.inputs.board == 'all'
            && fromJSON('["dedede", "octopus", "zork", "nissa", "hatch", "grunt", "snappy"]')
            || fromJSON(format('["{0}"]', github.event.inputs.board))
          }}

    steps:
      - name: Maximize build space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reclaim disk space for Nix
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave'

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            auto-optimise-store = true
            substituters = https://cache.nixos.org https://shimboot-systemd-nixos.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= shimboot-systemd-nixos.cachix.org-1:vCWmEtJq7hA2UOLN0s3njnGs9/EuX06kD7qOJMo2kAA=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: shimboot-systemd-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # Manual push controls exactly what gets cached
          skipPush: true

      - name: Build patched systemd
        if: ${{ github.event.inputs.build_patched_systemd == 'true' }}
        run: |
          echo "Building patched systemd..."
          success=false
          for i in {1..3}; do
            echo "[Attempt $i/3] Building systemd..."
            if nix build --impure --accept-flake-config \
              .#systemd --print-out-paths | tee /tmp/systemd-store-paths; then
              success=true
              break
            fi
            echo "[Attempt $i/3] Failed. Retrying in 10s..."
            sleep 10
          done
          if [ "$success" = "false" ]; then
            echo "Systemd build failed after 3 attempts."
            exit 1
          fi

      - name: Push patched systemd to Cachix
        if: ${{ github.event.inputs.build_patched_systemd == 'true' && env.CACHIX_AUTH_TOKEN != '' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -f /tmp/systemd-store-paths ]; then
            echo "Pushing patched systemd to Cachix..."
            cat /tmp/systemd-store-paths | cachix push shimboot-systemd-nixos
            nix path-info --recursive $(cat /tmp/systemd-store-paths) \
              | cachix push shimboot-systemd-nixos
          fi

      - name: Prewarm Cachix
        if: ${{ github.event.inputs.build_mode != 'systemd-only' }}
        run: |
          nix build --dry-run --impure --accept-flake-config \
            .#chromeos-shim-${{ matrix.board }} \
            .#chromeos-recovery-${{ matrix.board }} \
            .#extracted-kernel-${{ matrix.board }} \
            .#initramfs-patching-${{ matrix.board }} \
            .#raw-rootfs \
            2>&1 | grep -E "will be fetched|will be built" || true

      - name: Build Nix components
        if: ${{ github.event.inputs.build_mode != 'systemd-only' }}
        run: |
          BOARD="${{ matrix.board }}"
          ROOTFS="${{ github.event.inputs.rootfs || 'minimal' }}"

          success=false
          for i in {1..3}; do
            echo "[Attempt $i/3] Building core components for: $BOARD"
            if nix build --impure --accept-flake-config \
              .#chromeos-shim-${BOARD} \
              .#chromeos-recovery-${BOARD} \
              .#extracted-kernel-${BOARD} \
              .#initramfs-patching-${BOARD} \
              --print-out-paths; then
              success=true
              break
            fi
            echo "[Attempt $i/3] Failed. Retrying in 10s..."
            sleep 10
          done

          if [ "$success" = "false" ]; then echo "Core build failed."; exit 1; fi

          ROOTFS_ATTR="raw-rootfs"
          [ "$ROOTFS" = "minimal" ] && ROOTFS_ATTR="raw-rootfs-minimal"

          echo "Building RootFS: $ROOTFS_ATTR"
          nix build --impure --accept-flake-config ".#${ROOTFS_ATTR}" --print-out-paths

      - name: Push to Cachix
        if: ${{ github.event.inputs.build_mode == 'cachix-only' || github.event.inputs.build_mode == 'full' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          chmod +x tools/build/push-to-cachix.sh
          ./tools/build/push-to-cachix.sh \
            --board "${{ matrix.board }}" \
            --rootfs "${{ github.event.inputs.rootfs || 'minimal' }}" \
            --drivers "${{ github.event.inputs.drivers_mode || 'vendor' }}"

      - name: Install assembly dependencies
        if: ${{ github.event.inputs.build_mode == 'full' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y parted gdisk e2fsprogs util-linux pv zstd vboot-utils

      - name: Assemble image
        if: ${{ github.event.inputs.build_mode == 'full' }}
        run: |
          if [ -e /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]; then
            source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          fi

          ASSEMBLE_CMD=(
            ./tools/build/assemble-final.sh
            --board "${{ matrix.board }}"
            --rootfs "${{ github.event.inputs.rootfs || 'minimal' }}"
            --drivers "${{ github.event.inputs.drivers_mode || 'vendor' }}"
          )

          [ "${{ github.event.inputs.firmware_upstream }}" = "false" ] && ASSEMBLE_CMD+=(--no-firmware-upstream) || ASSEMBLE_CMD+=(--firmware-upstream)
          [ "${{ github.event.inputs.inspect_after }}" = "true" ] && ASSEMBLE_CMD+=(--inspect)

          success=false
          for i in {1..3}; do
            echo "[Attempt $i/3] Assembling..."
            if sudo -E env "PATH=$PATH" "NIX_PATH=$NIX_PATH" BOARD="${{ matrix.board }}" "${ASSEMBLE_CMD[@]}"; then
              success=true
              break
            fi
            echo "[Attempt $i/3] Failed. Retrying in 10s..."
            sleep 10
          done

          if [ "$success" = "false" ]; then echo "Assembly failed."; exit 1; fi

      - name: Compress and artifact
        if: ${{ github.event.inputs.build_mode == 'full' }}
        run: |
          set -e

          CI_WORKDIR="/nix/work/${{ matrix.board }}"
          LOCAL_WORKDIR="work/${{ matrix.board }}"

          if [ -f "$CI_WORKDIR/shimboot.img" ]; then
            WORKDIR="$CI_WORKDIR"
          elif [ -f "$LOCAL_WORKDIR/shimboot.img" ]; then
            WORKDIR="$LOCAL_WORKDIR"
          else
            echo "shimboot.img not found"; exit 1
          fi

          sudo chown -R $(whoami):$(whoami) "$WORKDIR"
          cd "$WORKDIR"

          ARTIFACT_BASE="${{ matrix.board }}-shimboot-${{ github.event.inputs.rootfs }}"

          stdbuf -oL pv shimboot.img | stdbuf -oL zstd -15 --long -T0 -o "${ARTIFACT_BASE}.img.zst"

          if [ "${{ github.event.inputs.include_checksum }}" = "true" ]; then
            sha256sum "${ARTIFACT_BASE}.img.zst" > "${ARTIFACT_BASE}.img.zst.sha256"
          fi

          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifacts/${{ matrix.board }}"
          mkdir -p "$ARTIFACT_DIR"
          mv "${ARTIFACT_BASE}.img.zst"* "$ARTIFACT_DIR/"

          sudo rm -f shimboot.img

      - name: Upload artifact
        if: ${{ github.event.inputs.build_mode == 'full' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}-shimboot-${{ github.event.inputs.rootfs }}
          path: artifacts/${{ matrix.board }}/*

  create-release:
    needs: build
    if: ${{ github.event.inputs.create_release == 'true' &&
            github.event.inputs.build_mode == 'full' &&
            github.event.inputs.build_mode != 'systemd-only' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release metadata
        id: metadata
        run: |
          TIMESTAMP=$(date -u '+%Y.%m.%d.%H%M-UTC')
          COMMIT=$(git rev-parse --short HEAD)
          BRANCH="${GITHUB_REF#refs/heads/}"

          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          cat >> "$GITHUB_OUTPUT" <<RELEASE_BODY
          ## Shimboot Release (${TIMESTAMP})
          Built from branch **${BRANCH}** at commit \`${COMMIT}\`.

          ### Config
          - **Rootfs**: ${{ github.event.inputs.rootfs }}
          - **Drivers**: ${{ github.event.inputs.drivers_mode }}
          - **Firmware Upstream**: ${{ github.event.inputs.firmware_upstream }}

          ### Usage (replace BOARD and sdX with actual values)
          - **BOARD**: Replace with the downloaded board name (e.g., dedede, octopus, etc.)
          - **sdX**: Replace with the actual USB drive device (e.g., sdb, sdc, etc.)

          #### Linux/macOS
          **WARNING: Requires root privileges (sudo/su)**

          **Prerequisites:** Install zstd utility if not already available
          - **Package Manager (preferred):**
            - Arch and derivatives: \`sudo pacman -Sy zstd\`
            - Ubuntu/Debian: \`sudo apt install zstd\`
            - macOS: \`brew install zstd\` or \`sudo port install zstd\`
            - Fedora/RHEL: \`sudo dnf install zstd\` or \`sudo yum install zstd\`
          - **Nix (if available):** \`nix-shell -p zstd\`
          - **Manual install:** Download from https://facebook.github.io/zstd/

          1. Extract the image:
          \`\`\`bash
          zstd -d BOARD-shimboot-${{ github.event.inputs.rootfs }}.img.zst
          \`\`\`

          2. List devices to find target USB drive:
          \`\`\`bash
          lsblk
          \`\`\`

          3. **Triple-check the \`of=\` device** before writing to the target USB drive:
          \`\`\`bash
          sudo dd if=BOARD-shimboot-${{ github.event.inputs.rootfs }}.img of=/dev/sdX bs=4M oflag=direct conv=fdatasync status=progress
          \`\`\`

          #### Windows
          1. Extract the image (use **7-Zip**):
             - Install 7-Zip: https://www.7-zip.org/
             - Right-click BOARD-shimboot-${{ github.event.inputs.rootfs }}.img.zst -> 7-Zip -> Extract Here

          2. Write to USB drive (use **Rufus**):
             - Install Rufus: https://rufus.ie/
             - Select the extracted BOARD-shimboot-${{ github.event.inputs.rootfs }}.img file
             (select \`list all file types\` on lower right dropdown of the file picker)
             - Verify that the correct target USB drive is set
             - Click START and confirm the overwrite notice
          RELEASE_BODY
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.timestamp }}
          name: ${{ steps.metadata.outputs.timestamp }} Build
          body: ${{ steps.metadata.outputs.body }}
          draft: true
          files: release-artifacts/*
