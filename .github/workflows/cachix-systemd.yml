# .github/workflows/cachix-systemd.yml
#
# Purpose: Build and push systemd to Cachix on schedule and flake.lock changes
#
# This module:
# - Triggers every 48 hours via cron
# - Triggers immediately on flake.lock changes
# - Builds the systemd derivation and pushes to Cachix

name: cachix-systemd

on:
  schedule:
    - cron: '0 0 */2 * *'
  push:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'patches/systemd-*.patch'
    branches:
      - dev
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'patches/systemd-*.patch'
    branches:
      - dev
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reclaim disk space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'cleave'

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            auto-optimise-store = true
            substituters = https://cache.nixos.org https://shimboot-systemd-nixos.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= shimboot-systemd-nixos.cachix.org-1:vCWmEtJq7hA2UOLN0s3njnGs9/EuX06kD7qOJMo2kAA=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: shimboot-systemd-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Check cache hit
        id: cache-check
        run: |
          path=$(nix eval --raw .#packages.x86_64-linux.systemd.outPath)
          if nix path-info --store https://shimboot-systemd-nixos.cachix.org "$path" &>/dev/null; then
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Build systemd
        id: build
        if: steps.cache-check.outputs.hit == 'false'
        run: |
          success=false
          for i in {1..3}; do
            echo "[Attempt $i/3] Building systemd..."
            if nix build --impure --accept-flake-config \
              .#systemd --print-out-paths | tee /tmp/store-paths; then
              success=true
              break
            fi
            echo "[Attempt $i/3] Failed. Retrying in 10s..."
            sleep 10
          done

          if [ "$success" = "false" ]; then
            echo "Build failed after 3 attempts."
            exit 1
          fi

      - name: Push to Cachix
        if: steps.cache-check.outputs.hit == 'false'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          cat /tmp/store-paths | cachix push shimboot-systemd-nixos
          # Include runtime closure
          nix path-info --recursive $(cat /tmp/store-paths) \
            | cachix push shimboot-systemd-nixos
